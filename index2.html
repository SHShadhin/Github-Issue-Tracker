<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Issues Tracker</title>
  <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

  <!-- Tailwind + daisy ui cdn -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <!-- icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    * {
      font-family: "Outfit", sans-serif;
    }
  </style>
</head>

<body class="bg-slate-100">
  <!-- navbar -->
   <header>
    <div class="navbar py-4 flex justify-between bg-base-100 shadow-sm">
      <div class="flex items-center mx-10">
        <img class="w-[50px]" src="assets/github-logo.png" alt="">
        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
      </div>

      <div class="flex gap-5 mx-10">
        <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
        <button class="btn btn-primary">+ New Issue</button>
      </div>
   </header>

   <!-- All buttons -->
   <section>
    <div class="max-w-10/12 mt-16 mx-auto bg-white shadow-sm py-5 px-10 rounded-lg">
        <div id="allBtns" class="flex gap-3">
          <button id="all-btn" class="btn btn-primary">All</button>
          <button id="open-btn" class="btn btn-outline">Open</button>
          <button id="close-btn" class="btn btn-outline">Closed</button>
        </div>
    </div>
   </section>

   <!-- All issues -->
    <section>
      <div class="max-w-10/12 mt-5 mx-auto bg-white shadow-sm py-5 px-10 rounded-lg">
        <div class="flex gap-3 justify-between">
          <div class="flex items-center gap-4">
            <img src="assets/Aperture.png" alt="">
            <div>
              <h3 class="text-xl font-medium">50 Issues</h3>
              <p class="text-lg text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex items-center gap-2">
            <div class="w-4 h-4 bg-green-500 rounded-full"></div>
            <p>Open</p>
            <div class="w-4 h-4 bg-purple-500 rounded-full"></div>
            <p>Closed</p>
          </div>
        </div>
      </div>
    </section>
    
    <!-- All cards -->
     <div id="all-issue-container" class="bg-slate-50 py-10 px-5 max-w-10/12 mx-auto grid grid-cols-3 gap-y-4">
      <!-- all card dynamically added here -->
     </div>


     <script src="script2.js"></script>
</body>

</html>
